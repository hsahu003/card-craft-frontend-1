version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm i -g pnpm
        # Pass the dependencies strictly as an inline array flag during install
        - pnpm install --only-built-dependencies=canvas,sharp,msw,core-js
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*