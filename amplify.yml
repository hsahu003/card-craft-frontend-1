version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm i -g pnpm
        # Approve the native builds before installing
        - pnpm config set only-built-dependencies canvas,sharp,msw,core-js
        - pnpm install
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*